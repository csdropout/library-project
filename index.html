<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Library</title>
</head>
<body>
    <dialog id="new-book-dialog" popover>
        <form method="dialog" novalidate>
            <div class="form-row">
                <div><label for="title">Title: </label></div>
                <input type="text" id="title" name="title" required>
                <span class="error" aria-live="polite"></span>
            </div>

            <div class="form-row">
                <div><label for="author">Author: </label></div>
                <input type="text" id="author" name="author" required>
                <span class="error" aria-live="polite"></span>
            </div>

            <div class="form-buttons">
                <button type="submit" id="add-button" popovertarget="new-book-dialog" popovertargetaction="hide">Add</button>
                <button type="button" id="cancel-button" popovertarget="new-book-dialog" popovertargetaction="hide">Cancel</button>
            </div>
        </form>
    </dialog>
    <div class="header">
        <h1>The Odin Library</h1>
        <div class="main-buttons">
            <button id="new-book-button" popovertarget="new-book-dialog">New Book</button>
            <button id="display-books-button">Display Books</button>
        </div>
    </div>
    <div id="books-container"></div>
    <script defer src="script.js"></script>
</body>
</html>
